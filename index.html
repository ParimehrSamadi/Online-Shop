<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Page</title>
    <link rel="stylesheet" href="assets/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/bootstrap/css/bootstrap-utilities.min.css">

    <main class="container-fluid">
        <div class="row mt-5">
            <div class="col-5 d-flex flex-column justify-content-start text-start">
                <p>Range Of Price</p>
                <div class="d-flex justify-content-start"><input type="range" class="form-range w-75" id="customRange1" onchange="rangeHandler(this)">

            </div>
            <div class="col-7 d-flex justify-content-end">
                <select class="form-select border-primary w-25 h-75 mt-1" aria-label="Default select example" id="select" onchange="optionHandler(this)">
                    <option selected value="All">All</option>
                </select>
            </div>
        </div>
        <div class="d-flex flex-wrap" id="product"></div>

    </main>


    <script src="assets/bootstrap/js/bootstrap.min.js"></script>
